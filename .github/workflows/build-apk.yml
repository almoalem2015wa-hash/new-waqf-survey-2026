name: Build Waqf APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          sudo ln -sf /opt/gradle-8.4/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/waqf/survey
          mkdir -p app/src/main/assets/www
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-v26

          cp waqf_survey_v10.html app/src/main/assets/www/index.html

          cat > settings.gradle << 'EOF'
          rootProject.name = "WaqfSurvey"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
            repositories { google(); mavenCentral() }
          }
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
            namespace 'com.waqf.survey'
            compileSdkVersion 34
            defaultConfig {
              applicationId 'com.waqf.survey'
              minSdkVersion 21
              targetSdkVersion 34
              versionCode 1
              versionName '1.0'
            }
            buildTypes {
              debug { debuggable true; minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          configurations.all {
            resolutionStrategy {
              force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
              force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
              force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'androidx.core:core:1.13.1'
            implementation 'androidx.webkit:webkit:1.11.0'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
            <uses-permission android:name="android.permission.CAMERA"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
            <uses-feature android:name="android.hardware.camera" android:required="false"/>
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name"
                android:supportsRtl="true"
                android:theme="@style/AppTheme"
                android:hardwareAccelerated="true"
                android:usesCleartextTraffic="true"
                android:requestLegacyExternalStorage="true">
              <activity
                  android:name=".MainActivity"
                  android:exported="true"
                  android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale"
                  android:windowSoftInputMode="adjustResize">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <provider
                  android:name="androidx.core.content.FileProvider"
                  android:authorities="com.waqf.survey.fileprovider"
                  android:exported="false"
                  android:grantUriPermissions="true">
                <meta-data
                    android:name="android.support.FILE_PROVIDER_PATHS"
                    android:resource="@xml/file_paths"/>
              </provider>
            </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/waqf/survey/MainActivity.java << 'EOF'
          package com.waqf.survey;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.webkit.GeolocationPermissions;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Toast;
          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import java.util.ArrayList;
          import java.util.List;
          public class MainActivity extends AppCompatActivity {
              private static final int PERM = 1001;
              private WebView wv;
              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  wv = new WebView(this);
                  setContentView(wv);
                  WebSettings ws = wv.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setGeolocationEnabled(true);
                  ws.setAllowFileAccess(true);
                  ws.setAllowContentAccess(true);
                  ws.setAllowFileAccessFromFileURLs(true);
                  ws.setAllowUniversalAccessFromFileURLs(true);
                  ws.setLoadWithOverviewMode(true);
                  ws.setUseWideViewPort(true);
                  ws.setBuiltInZoomControls(true);
                  ws.setDisplayZoomControls(false);
                  ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  ws.setCacheMode(WebSettings.LOAD_DEFAULT);
                  ws.setDatabaseEnabled(true);
                  wv.setWebViewClient(new WebViewClient() {
                      @Override public boolean shouldOverrideUrlLoading(WebView v, String url) {
                          v.loadUrl(url); return true;
                      }
                  });
                  wv.setWebChromeClient(new WebChromeClient() {
                      @Override public void onGeolocationPermissionsShowPrompt(String o, GeolocationPermissions.Callback c) {
                          c.invoke(o, true, false);
                      }
                  });
                  wv.loadUrl("file:///android_asset/www/index.html");
                  if (!hasPerm()) showDialog();
              }
              private boolean hasPerm() {
                  for (String p : getPerms())
                      if (ContextCompat.checkSelfPermission(this,p)!=PackageManager.PERMISSION_GRANTED) return false;
                  return true;
              }
              private String[] getPerms() {
                  List<String> l = new ArrayList<>();
                  l.add(Manifest.permission.ACCESS_FINE_LOCATION);
                  l.add(Manifest.permission.ACCESS_COARSE_LOCATION);
                  l.add(Manifest.permission.CAMERA);
                  if (Build.VERSION.SDK_INT >= 33) l.add(Manifest.permission.READ_MEDIA_IMAGES);
                  else { l.add(Manifest.permission.READ_EXTERNAL_STORAGE);
                         if (Build.VERSION.SDK_INT<=28) l.add(Manifest.permission.WRITE_EXTERNAL_STORAGE); }
                  return l.toArray(new String[0]);
              }
              private void showDialog() {
                  new AlertDialog.Builder(this)
                      .setTitle("نظام المسح الوقفي")
                      .setMessage("يحتاج التطبيق:\n\n📍 الموقع\n📁 الملفات\n📷 الكاميرا")
                      .setPositiveButton("السماح", (d,w)->ActivityCompat.requestPermissions(this,getPerms(),PERM))
                      .setNegativeButton("تخطي",null).setCancelable(false).show();
              }
              @Override public void onRequestPermissionsResult(int c, @NonNull String[] p, @NonNull int[] r) {
                  super.onRequestPermissionsResult(c,p,r);
                  boolean ok=true; for(int x:r) if(x!=0){ok=false;break;}
                  Toast.makeText(this,ok?"✅ تم منح الإذونات":"⚠️ بعض الوظائف محدودة",Toast.LENGTH_LONG).show();
                  if(ok) wv.reload();
              }
              @Override public void onBackPressed() { if(wv.canGoBack()) wv.goBack(); else super.onBackPressed(); }
          }
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">المسح الوقفي</string></resources>' > app/src/main/res/values/strings.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#1e293b</color><color name="colorPrimaryDark">#0f172a</color><color name="colorAccent">#3b82f6</color></resources>' > app/src/main/res/values/colors.xml

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
              <item name="colorPrimary">@color/colorPrimary</item>
              <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
              <item name="colorAccent">@color/colorAccent</item>
              <item name="android:windowBackground">@color/colorPrimaryDark</item>
            </style>
          </resources>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><paths><external-path name="e" path="."/><cache-path name="c" path="."/><files-path name="f" path="."/></paths>' > app/src/main/res/xml/file_paths.xml
          echo '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#0f172a"/></shape>' > app/src/main/res/drawable/ic_launcher_background.xml

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#3b82f6" android:pathData="M54,20 L70,45 L90,45 L76,60 L82,85 L54,70 L26,85 L32,60 L18,45 L38,45 Z"/>
          </vector>
          EOF

          ICON='<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="48dp" android:height="48dp" android:viewportWidth="48" android:viewportHeight="48"><rect width="48" height="48" android:fillColor="#0f172a"/><path android:fillColor="#3b82f6" android:pathData="M24,8 L31,20 L40,20 L34,27 L37,38 L24,31 L11,38 L14,27 L8,20 L17,20 Z"/></vector>'
          for d in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi; do
            echo "$ICON" > app/src/main/res/${d}/ic_launcher.xml
          done

          cat > app/src/main/res/mipmap-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew
          ls -la gradlew

      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace
          find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waqf-survey-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.${{ github.run_number }}"
          name: "🕌 نظام المسح الوقفي v1.${{ github.run_number }}"
          body: |
            ## تحميل التطبيق
            1. حمّل app-debug.apk
            2. ثبّته على جهاز أندرويد
            3. اقبل تثبيت من مصادر خارجية
            4. افتح وامنح الإذونات ✅
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
