name: Build Waqf APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Create Project Structure
        run: |
          mkdir -p android/app/src/main/java/com/waqf/survey
          mkdir -p android/app/src/main/assets/www
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/xml
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/gradle/wrapper

      - name: Copy HTML to Assets
        run: cp waqf_survey_v10.html android/app/src/main/assets/www/index.html

      - name: Create AndroidManifest
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.waqf.survey">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
            <uses-permission android:name="android.permission.CAMERA"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
            <uses-permission android:name="android.permission.VIBRATE"/>
            <uses-feature android:name="android.hardware.camera" android:required="false"/>
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name"
                android:supportsRtl="true"
                android:theme="@style/AppTheme"
                android:hardwareAccelerated="true"
                android:usesCleartextTraffic="true"
                android:requestLegacyExternalStorage="true">
              <activity
                  android:name=".MainActivity"
                  android:exported="true"
                  android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale"
                  android:windowSoftInputMode="adjustResize">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
              <provider
                  android:name="androidx.core.content.FileProvider"
                  android:authorities="com.waqf.survey.fileprovider"
                  android:exported="false"
                  android:grantUriPermissions="true">
                <meta-data
                    android:name="android.support.FILE_PROVIDER_PATHS"
                    android:resource="@xml/file_paths"/>
              </provider>
            </application>
          </manifest>
          EOF

      - name: Create MainActivity
        run: |
          cat > android/app/src/main/java/com/waqf/survey/MainActivity.java << 'EOF'
          package com.waqf.survey;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.webkit.GeolocationPermissions;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Toast;
          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import java.util.ArrayList;
          import java.util.List;
          public class MainActivity extends AppCompatActivity {
              private static final int PERM = 1001;
              private WebView wv;
              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  wv = new WebView(this);
                  setContentView(wv);
                  WebSettings ws = wv.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setGeolocationEnabled(true);
                  ws.setAllowFileAccess(true);
                  ws.setAllowContentAccess(true);
                  ws.setAllowFileAccessFromFileURLs(true);
                  ws.setAllowUniversalAccessFromFileURLs(true);
                  ws.setLoadWithOverviewMode(true);
                  ws.setUseWideViewPort(true);
                  ws.setBuiltInZoomControls(true);
                  ws.setDisplayZoomControls(false);
                  ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  ws.setCacheMode(WebSettings.LOAD_DEFAULT);
                  ws.setDatabaseEnabled(true);
                  wv.setWebViewClient(new WebViewClient() {
                      @Override public boolean shouldOverrideUrlLoading(WebView v, String url) {
                          v.loadUrl(url); return true;
                      }
                  });
                  wv.setWebChromeClient(new WebChromeClient() {
                      @Override public void onGeolocationPermissionsShowPrompt(String o, GeolocationPermissions.Callback c) {
                          c.invoke(o, true, false);
                      }
                  });
                  wv.loadUrl("file:///android_asset/www/index.html");
                  if (!hasPerm()) showDialog();
              }
              private boolean hasPerm() {
                  for (String p : getPerms())
                      if (ContextCompat.checkSelfPermission(this,p)!=PackageManager.PERMISSION_GRANTED) return false;
                  return true;
              }
              private String[] getPerms() {
                  List<String> l = new ArrayList<>();
                  l.add(Manifest.permission.ACCESS_FINE_LOCATION);
                  l.add(Manifest.permission.ACCESS_COARSE_LOCATION);
                  l.add(Manifest.permission.CAMERA);
                  if (Build.VERSION.SDK_INT >= 33) l.add(Manifest.permission.READ_MEDIA_IMAGES);
                  else { l.add(Manifest.permission.READ_EXTERNAL_STORAGE);
                         if (Build.VERSION.SDK_INT<=28) l.add(Manifest.permission.WRITE_EXTERNAL_STORAGE); }
                  return l.toArray(new String[0]);
              }
              private void showDialog() {
                  new AlertDialog.Builder(this)
                      .setTitle("نظام المسح الوقفي")
                      .setMessage("يحتاج التطبيق إلى:\n\n📍 الموقع — لتحديد موقع القطعة\n📁 الملفات — لحفظ وفتح ملفات المسح\n📷 الكاميرا — لصور الموقع\n\nيرجى السماح بالإذونات.")
                      .setPositiveButton("السماح", (d,w)->ActivityCompat.requestPermissions(this,getPerms(),PERM))
                      .setNegativeButton("تخطي",null).setCancelable(false).show();
              }
              @Override public void onRequestPermissionsResult(int code, @NonNull String[] p, @NonNull int[] r) {
                  super.onRequestPermissionsResult(code,p,r);
                  boolean ok=true; for(int x:r) if(x!=PackageManager.PERMISSION_GRANTED){ok=false;break;}
                  Toast.makeText(this,ok?"✅ تم منح الإذونات":"⚠️ بعض الوظائف محدودة",Toast.LENGTH_LONG).show();
                  if(ok) wv.reload();
              }
              @Override public void onBackPressed() { if(wv.canGoBack()) wv.goBack(); else super.onBackPressed(); }
          }
          EOF

      - name: Create Resource Files
        run: |
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">المسح الوقفي</string></resources>
          EOF

          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#1e293b</color>
            <color name="colorPrimaryDark">#0f172a</color>
            <color name="colorAccent">#3b82f6</color>
          </resources>
          EOF

          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
              <item name="colorPrimary">@color/colorPrimary</item>
              <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
              <item name="colorAccent">@color/colorAccent</item>
              <item name="android:windowBackground">@color/colorPrimaryDark</item>
            </style>
          </resources>
          EOF

          cat > android/app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
            <external-path name="external" path="."/>
            <cache-path name="cache" path="."/>
            <files-path name="files" path="."/>
          </paths>
          EOF

          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#0f172a"/>
          </shape>
          EOF

          cat > android/app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp"
            android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#3b82f6"
              android:pathData="M54,20 L70,45 L90,45 L76,60 L82,85 L54,70 L26,85 L32,60 L18,45 L38,45 Z"/>
          </vector>
          EOF

          for d in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi; do
          cat > android/app/src/main/res/${d}/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          done

      - name: Create Gradle Files
        run: |
          cat > android/build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > android/settings.gradle << 'EOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "WaqfSurvey"
          include ':app'
          EOF

          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > android/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.waqf.survey'
            compileSdk 34
            defaultConfig {
              applicationId 'com.waqf.survey'
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName '1.0'
            }
            buildTypes {
              debug { debuggable true; minifyEnabled false }
              release { minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'androidx.core:core:1.13.1'
            implementation 'androidx.webkit:webkit:1.11.0'
          }
          EOF

          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Setup Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.4 2>/dev/null || true
          chmod +x gradlew 2>/dev/null || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waqf-survey-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.${{ github.run_number }}"
          name: "🕌 نظام المسح الوقفي v1.${{ github.run_number }}"
          body: |
            ## تحميل التطبيق
            1. حمّل الملف `app-debug.apk` من الأسفل
            2. ثبّته على جهازك الأندرويد
            3. اقبل تثبيت التطبيقات من مصادر خارجية
            4. افتح التطبيق — سيطلب الإذونات تلقائياً ✅
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
